# LOCAL DEVELOPMENT ONLY — do not use on the VPS.
# Production: docker compose -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:16-alpine
    container_name: mirafood-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mirafood
    ports:
      - "5433:5432"
    volumes:
      - mirafood_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mirafood"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mirafood-redis
    ports:
      - "6380:6379"
    volumes:
      - mirafood_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: mirafood-api
    ports:
      - "3011:3011"
    environment:
      NODE_ENV: development
      PORT: 3011
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mirafood
      REDIS_URL: redis://redis:6379
      AUTO_RUN_MIGRATIONS: "true"
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8081,http://127.0.0.1:8081
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mirafood_pg_data:
  mirafood_redis_data:
