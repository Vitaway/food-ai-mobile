services:
  postgres:
    image: postgres:16-alpine
    container_name: mirafood-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mirafood
    ports:
      - "5433:5432"
    volumes:
      - mirafood_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mirafood"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mirafood-redis
    ports:
      - "6380:6379"
    volumes:
      - mirafood_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mirafood_pg_data:
  mirafood_redis_data:
