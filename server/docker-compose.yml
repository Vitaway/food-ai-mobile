name: mirafood

services:
  postgres:
    image: postgres:16-alpine
    container_name: mirafood-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: mirafood
    volumes:
      - mirafood_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mirafood"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Local dev only — bound to loopback, never exposed to the internet
    ports:
      - "127.0.0.1:5433:5432"

  redis:
    image: redis:7-alpine
    container_name: mirafood-redis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - mirafood_redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli --no-auth-warning -a "$$REDIS_PASSWORD" ping | grep -q PONG',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:6380:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mirafood-api:latest
    container_name: mirafood-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3011
      AUTO_RUN_MIGRATIONS: "true"
      # Local compose still uses NODE_ENV=production; keep seed coach/admin OTP-free via auth seed exemption.
      # Set MFA_REQUIRED_FOR_STAFF=true in .env only when you want OTP for non-seed staff.
    volumes:
      - mirafood_uploads:/app/uploads
    # LAN-accessible for Expo Go / physical devices on the same Wi‑Fi (postgres/redis stay loopback-only).
    ports:
      - "3011:3011"

volumes:
  mirafood_pg_data:
  mirafood_redis_data:
  mirafood_uploads:
