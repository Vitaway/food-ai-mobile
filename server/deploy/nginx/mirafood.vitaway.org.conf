# MiraFood web dashboard — mirafood.vitaway.org
# Serves the Vite/React coach + marketing SPA (static build).
# API calls go to https://vitaway.nsengi.space/api/v1 (see web/.env.production.example).
#
# Install after building web:
#   cd web && npm run build
#   sudo mkdir -p /var/www/mirafood-web
#   sudo rsync -av dist/ /var/www/mirafood-web/
#   sudo cp deploy/nginx/mirafood.vitaway.org.conf /etc/nginx/sites-available/mirafood.vitaway.org
#   sudo ln -sf /etc/nginx/sites-available/mirafood.vitaway.org /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d mirafood.vitaway.org
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name mirafood.vitaway.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mirafood.vitaway.org;

    ssl_certificate /etc/letsencrypt/live/mirafood.vitaway.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mirafood.vitaway.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/mirafood-web;
    index index.html;

    # SPA client-side routes (coach dashboard, marketing pages)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
