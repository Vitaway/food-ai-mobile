# MiraFood API reverse-proxy locations (included by vitaway.nsengi.space site).
# Replaces legacy Flask mobile/backend on 127.0.0.1:5050 → Node API on 127.0.0.1:@API_PORT@

client_max_body_size 25M;

# --- Legacy Flask paths (mobile/backend) ---
location = /health {
    proxy_pass http://127.0.0.1:@API_PORT@/api/v1/health;
    include /etc/nginx/snippets/mirafood-api-proxy-headers.conf;
}

location = /plates/detect {
    proxy_pass http://127.0.0.1:@API_PORT@/api/v1/vision/plates/detect;
    include /etc/nginx/snippets/mirafood-api-proxy-headers.conf;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
}

# --- Node API ---
location /api/ {
    proxy_pass http://127.0.0.1:@API_PORT@;
    include /etc/nginx/snippets/mirafood-api-proxy-headers.conf;
    proxy_read_timeout 180s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 180s;
}

# --- WebSocket notifications ---
location /ws/ {
    proxy_pass http://127.0.0.1:@API_PORT@;
    include /etc/nginx/snippets/mirafood-api-proxy-headers.conf;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
}

# --- Fallback (health/runtime at root if added later) ---
location / {
    proxy_pass http://127.0.0.1:@API_PORT@;
    include /etc/nginx/snippets/mirafood-api-proxy-headers.conf;
    proxy_read_timeout 180s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 180s;
}
