# MiraFood Node API — vitaway.nsengi.space
# Replaces: mobile/backend Flask + gunicorn on 127.0.0.1:5050
# Install: sudo bash deploy/deploy.sh  (or deploy/install-nginx.sh)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP — used for initial certbot; upgraded to redirect after SSL exists
server {
    listen 80;
    listen [::]:80;
    server_name @DOMAIN@;

@HTTP_REDIRECT_OR_PROXY@
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name @DOMAIN@;

    ssl_certificate @CERT_DIR@/fullchain.pem;
    ssl_certificate_key @CERT_DIR@/privkey.pem;
@SSL_OPTIONS@

    include /etc/nginx/snippets/mirafood-api-locations.conf;
}
