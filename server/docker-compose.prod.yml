# Production stack for Contabo VPS.
# - API: localhost:3011 only (nginx terminates TLS)
# - Postgres + Redis: internal Docker network only (no host ports)
services:
  postgres:
    image: postgres:16-alpine
    container_name: mirafood-postgres
    restart: unless-stopped
    networks:
      - mirafood_data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: mirafood
    volumes:
      - mirafood_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mirafood"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mirafood-redis
    restart: unless-stopped
    networks:
      - mirafood_data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --bind
      - "0.0.0.0"
      - --protected-mode
      - "yes"
    volumes:
      - mirafood_redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli --no-auth-warning -a "$$REDIS_PASSWORD" ping | grep -q PONG',
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: mirafood-api:prod
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: mirafood-api
    restart: unless-stopped
    networks:
      - mirafood_data
      - mirafood_egress
    ports:
      - "127.0.0.1:3011:3011"
    environment:
      NODE_ENV: production
      PORT: 3011
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      AUTO_RUN_MIGRATIONS: "true"
    env_file:
      - path: .env
        required: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  mirafood_data:
    name: mirafood_data
    internal: true
  mirafood_egress:
    name: mirafood_egress

volumes:
  mirafood_pg_data:
  mirafood_redis_data:
