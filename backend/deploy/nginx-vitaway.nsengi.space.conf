# /etc/nginx/sites-available/vitaway.nsengi.space
# Proxies HTTP + HTTPS to the Flask API on 127.0.0.1:5050
#
# Install:
#   sudo cp deploy/nginx-vitaway.nsengi.space.conf /etc/nginx/sites-available/vitaway.nsengi.space
#   sudo ln -sf /etc/nginx/sites-available/vitaway.nsengi.space /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d vitaway.nsengi.space
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name vitaway.nsengi.space;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 180s;
    }
}

# Certbot adds a second server { listen 443 ssl; ... } block below, or extends this file.
# If HTTPS returns "Cannot GET /health" from Express, another site is stealing port 443.
# Run: sudo bash deploy/fix-https.sh
